<!DOCTYPE html>
<html>
<head>
    <title>SmartHire AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        
body {
    animation: fadeIn 0.8s ease-in-out;
    background: linear-gradient(-45deg, #141e30, #243b55, #1f1c2c, #2c5364);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🔥 LOGO */
.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    transition: 0.4s ease;
    box-shadow: 0 0 15px rgba(0,255,200,0.5);
}

.logo:hover {
    transform: scale(1.15) rotate(8deg);
    box-shadow: 0 0 30px rgba(0,255,200,0.9);
}

/* ✨ Gradient Title */
.title {
    font-weight: bold;
    font-size: 28px;
    background: linear-gradient(90deg, #00ffd5, #00aaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 💎 Glass Card */
.card {
    background: rgba(255, 255, 255, 0.08) !important;
    backdrop-filter: blur(18px);
    border-radius: 25px !important;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white !important;
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* 🚀 Buttons */
.btn-success {
    background: linear-gradient(45deg, #00c9ff, #00ffcc);
    border: none;
}

.btn-success:hover {
    transform: scale(1.07);
    box-shadow: 0 0 15px rgba(0,255,200,0.6);
}

/* Inputs */
input, textarea {
    border-radius: 15px !important;
}

/* 🔥 Loader */
.loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    color: white;
}
</style>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="text-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4 rounded-4">

        <!-- 🔥 LOGO + BRAND -->
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

            <h2 class="mt-3 title">SmartHire AI</h2>

            <p style="font-size: 14px; color: #bbb;">
                Intelligent Resume Screening System
            </p>
        </div>

        <form action="/analyze" method="post" enctype="multipart/form-data" onsubmit="showLoader()">

            <div class="mb-3">
                <label class="form-label">Upload Resumes (PDF)</label>
                <input class="form-control" type="file" name="resumes" multiple required>
                <small class="text-muted">Hold Ctrl to select multiple files</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Paste Job Description</label>
                <textarea class="form-control" name="job_description" rows="6" required></textarea>
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-success btn-lg">Analyze Resume 🚀</button>

                <a href="/dashboard" class="btn btn-secondary btn-lg">
                ⬅️ Back to Dashboard
                </a>
            </div>

        </form>

    </div>
</div>

<!-- 🔥 Loader -->
<div id="loader" class="loader-overlay">

    <h4 class="mb-3">🧠 AI Processing...</h4>

    <div class="progress w-50 mb-3">
        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-info"
             style="width: 0%">0%</div>
    </div>

    <p id="statusText">Initializing...</p>

</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "flex";

    let progress = 0;
    let bar = document.getElementById("progressBar");
    let status = document.getElementById("statusText");

    let messages = [
        "Scanning resume...",
        "Extracting skills...",
        "Matching...",
        "Running AI model...",
        "Finalizing..."
    ];

    let interval = setInterval(function() {
        progress += 5;
        bar.style.width = progress + "%";
        bar.innerHTML = progress + "%";

        let index = Math.floor(progress / 20);
        if (messages[index]) status.innerHTML = messages[index];

        if (progress >= 100) clearInterval(interval);
    }, 150);
}
</script>

</body>
</html>
