<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
/* Smooth page load */
body {
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 🌌 AI Gradient Background */
body {
    background: linear-gradient(-45deg, #141e30, #243b55, #1f1c2c, #2c5364);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* Background animation */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🧊 Glass Effect Card */
.card {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(15px);
    border-radius: 20px !important;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white !important;
    transition: 0.3s ease-in-out;
}

/* Hover animation */
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

/* Buttons */
.btn {
    border-radius: 25px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Input fields */
input, textarea {
    border-radius: 15px !important;
}

/* ✅ LOGO STYLE */
.logo-circle {
    width: 90px;
    height: 90px;
    object-fit: cover;

    border-radius: 50%;
    border: 3px solid #00d4ff;
    padding: 4px;
    background: white;

    transition: 0.3s ease;
}

.logo-circle:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #00d4ff;
}

</style>
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg rounded-4" style="width: 350px;">
    
    <!-- ✅ LOGO ADDED HERE -->
    <div class="text-center mb-3">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo-circle">
        <h4 class="mt-2">SmartHire</h4>
    </div>

    <h3 class="text-center mb-3">Login</h3>

    <form method="POST">
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-success w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account? <a href="/register">Register</a>
    </p>
</div>

</body>
</html>
