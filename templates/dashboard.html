<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        
/* Smooth page load */
body {
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 🌌 AI Gradient Background */
body {
    background: linear-gradient(-45deg, #141e30, #243b55, #1f1c2c, #2c5364);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* Background animation */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🧊 Glass Effect Card */
.card {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(15px);
    border-radius: 20px !important;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white !important;
    transition: 0.3s ease-in-out;
}

/* Hover animation */
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

/* Buttons */
.btn {
    border-radius: 25px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Input fields */
input, textarea {
    border-radius: 15px !important;
}

/* ✅ LOGO STYLE */
.logo-circle {
    width: 45px;
    height: 45px;
    object-fit: cover;

    border-radius: 50%;
    border: 2px solid #00d4ff;
    padding: 2px;
    background: white;

    transition: 0.3s ease;
}

.logo-circle:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px #00d4ff;
}

</style>
</head>

<body class="bg-dark text-light">

<!-- ✅ UPDATED NAVBAR WITH LOGO -->
<nav class="navbar navbar-dark bg-black px-4 d-flex justify-content-between">

    <div class="d-flex align-items-center">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo-circle me-2">
        <span class="navbar-brand mb-0 h5">SmartHire</span>
    </div>

    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-5 text-center">
    <h2>Welcome, {{ username }}</h2>
    <p class="mt-3">This is your dashboard.</p>

    <div class="mt-4">
        <a href="/" class="btn btn-primary me-2">Analyze New Resume</a>
        <a href="/history" class="btn btn-warning me-2">View Resume History</a>

        {% if username == "admin" %}
            <a href="/admin" class="btn btn-danger">Admin Panel</a>
        {% endif %}
    </div>
</div>

</body>
</html>
